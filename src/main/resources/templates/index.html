<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Test D R I V E'"></title>
    <link href="/css/main.css" rel="stylesheet">
</head>
<body>
<div id="blackScreen">
    <p>Zum Starten beliebige Taste drücken...</p>
</div>
<!--<h2 class="hello-title" th:text="'Test D R I V E, v' + ${version}"></h2>-->

<div style="display: flex;">
    <div>
        <canvas id="canvas"
                width="640"
                height="480"
                style="border:1px solid lightgrey;"
        >
            Your browser does not support the HTML5 canvas tag.
        </canvas>
    </div>
    <div style="display: flex; flex-direction: column;">
        <canvas id="mapDebugCanvas"
                width="138"
                height="138"
                style="border:1px solid lightgrey;"
        >
            Your browser does not support the HTML5 canvas tag.
        </canvas>

        <canvas id="mapDebugCanvas2"
                width="138"
                height="138"
                style="border:1px solid lightgrey;"
        >
            Your browser does not support the HTML5 canvas tag.
        </canvas>
    </div>
</div>

<div th:text="'It is, ' + ${nowDateTime} + '!'"></div>

<button id="startFullScreen">Go FullScreen</button>
<button id="playAudio">Music on</button>

<div style="display: flex; margin-top: 10px; font-family: monospace;">
    <div>
        <label>Scale:
            <input type="range" id="scaleSlider" min="50" max="300">
            <span id="scaleValue">120</span>
        </label>
        <br>

        <label>Horizon Y:
            <input type="range" id="horizonSlider" min="50" max="300">
            <span id="horizonValue">150</span>
        </label>
        <br>

        <label>Vertical Stretch:
            <input type="range" id="stretchSlider" min="0.2" max="2" step="0.05">
            <span id="stretchValue">0.8</span>
        </label>
        <br>

        <label>Near Plane:
            <input type="range" id="nearSlider" min="0.1" max="2" step="0.05">
            <span id="nearValue">0.8</span>
        </label>
        <br>
    </div>
    <div style="margin-left: 20px;">
        <label>Depth:
            <input type="range" id="depthSlider" min="0" max="10">
            <span id="depthValue">5</span>
        </label>
        <br>

        <label>Horizontal Width:
            <input type="range" id="widthSlider" min="0.2" max="2" step="0.05">
            <span id="widthValue">0.5</span>
        </label>
        <br>

        <label>Image soothing:
            <input type="checkbox" id="imageSoothingCheckbox" value="true">
        </label>
        <label>Grid mode:
            <input type="checkbox" id="gridModeCheckbox" value="true">
        </label>
    </div>
</div>

<script data-main="/js/main" src="/js/require.js"></script>
</body>
</html>
